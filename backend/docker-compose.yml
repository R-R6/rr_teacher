version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: chem-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: chem_teacher
      MYSQL_USER: chem_user
      MYSQL_PASSWORD: chem_pass123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --init-connect=SET NAMES utf8mb4
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # FastAPI 后端
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: chem-backend
    restart: unless-stopped
    ports:
      - "8000:8080"
    env_file:
      - .env.docker
    volumes:
      - ../frontend/admin-dist:/frontend/admin-dist:ro
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
