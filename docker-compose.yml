version: "3.8"

services:
  # ── MySQL 数据库 ──
  mysql:
    image: mysql:8.0
    container_name: chem_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-chem_teacher}
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Redis 缓存 ──
  redis:
    image: redis:7-alpine
    container_name: chem_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ── FastAPI 后端 ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chem_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-root123}
      - DB_NAME=${DB_NAME:-chem_teacher}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-this}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this}
    volumes:
      - uploads_data:/app/uploads
      - exports_data:/app/exports
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  # ── OCR 微服务 (PaddleOCR) ──
  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: chem_ocr
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ocr_cache:/root/.paddleocr
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  mysql_data:
  redis_data:
  uploads_data:
  exports_data:
  ocr_cache:
